services:
  pmo-dashboard:
    build: .
    container_name: pmo-dashboard
    ports:
      - "127.0.0.1:6666:6666"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=3000
      - CADDY_PORT=6666
      - DATABASE_URL=file:/app/db/custom.db
    volumes:
      - pmo-db:/app/db
      - pmo-uploads:/app/public/uploads
    restart: unless-stopped

volumes:
  pmo-db:
  pmo-uploads:
