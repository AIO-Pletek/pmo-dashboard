services:
  pmo-dashboard:
    build: .
    container_name: pmo-dashboard
    ports:
      # Bind to localhost only — nginx reverse-proxies from port 80
      - "127.0.0.1:6666:6666"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=3000
      - CADDY_PORT=6666
      - DATABASE_URL=file:/app/db/custom.db
      - JWT_SECRET=pmo-dashboard-jwt-secret-change-in-production
      - ALLOWED_EMAIL_DOMAINS=company.com,gmail.com,example.com,test.com
      - APP_URL=http://116.204.131.112
    volumes:
      # Persistent database
      - pmo-db:/app/db
      # Persistent uploads
      - pmo-uploads:/app/public/uploads
    restart: unless-stopped

volumes:
  pmo-db:
  pmo-uploads:
